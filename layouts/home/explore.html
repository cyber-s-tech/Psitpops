<!DOCTYPE html>
<html>

<head>
    <title>Blog</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap%22" rel="stylesheet">

</head>

<body class="[font-family:'DM_Sans',sans-serif] bg-gray-100">

    <div id="header"></div>


    <!-- FEATURED DEVOTIONALS -->

    <!-- <section class="bg-[#23314f] py-24 px-[10%] text-white">

        <h2 class="text-center text-4xl font-semibold mb-2 [font-family:'Darker_Grotesque',sans-serif]">
            Featured Devotionals
        </h2>

        <p class="text-center text-gray-300 mb-12">
            Weekly reflections to encourage your spiritual journey.
        </p>

        <div id="featuredPosts" class="grid md:grid-cols-3 gap-8"></div>

        <a href="all-blogs.html"
            class="block w-fit mx-auto mt-10 bg-[#e2b13c] text-white px-7 py-3 rounded-md font-semibold">
            View All Articles
        </a>

    </section> -->



    <!-- FEATURED TEMPLATE -->

    <template id="featuredTemplate">

        <div class="bg-white rounded-xl overflow-hidden shadow-lg text-gray-800">

            <div class="relative">

                <img class="post-image w-full h-[200px] object-cover">

                <span
                    class="post-category absolute top-4 left-4 bg-[#e2b13c] text-white text-xs px-3 py-1 rounded-full"></span>

            </div>

            <div class="p-6">

                <h3 class="post-title text-2xl font-bold mb-2 [font-family:'Darker_Grotesque',sans-serif]"></h3>

                <p class="post-excerpt text-sm text-gray-600 mb-2"></p>

                <a class="post-link text-[#e2b13c] font-semibold">
                    Read More
                </a>

            </div>

        </div>

    </template>



    <!-- EXPLORE BY TOPIC -->

    <section class="py-24 px-[10%]">

        <h2 class="text-center text-4xl font-semibold mb-2 [font-family:'Darker_Grotesque',sans-serif]">
            Explore by Topic
        </h2>

        <p class="text-center text-gray-500 mb-12">
            Weekly reflections to encourage your spiritual journey.
        </p>

        <div id="topicsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-5 "></div>

    </section>



    <!-- TOPIC TEMPLATE -->

    <template id="topicTemplate">

        <a class="topic-card relative rounded-xl overflow-hidden group">

            <img class="topic-image w-full h-[275px] object-cover transition duration-500 group-hover:scale-110">

            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent"></div>

            <div
                class="topic-title absolute bottom-4 left-1/2 -translate-x-1/2 text-white text-[30px] font-semibold text-center [font-family:'Darker_Grotesque',sans-serif]">
            </div>

        </a>

    </template>



    <!-- LATEST ARTICLES -->

    <section class="bg-[#23314f] py-24 px-[10%] text-white">

        <h2 class="text-center text-4xl font-semibold mb-2 [font-family:'Darker_Grotesque',sans-serif]">
            Latest Articles
        </h2>

        <p class="text-center text-gray-300 mb-12">
            Explore our most recent biblical reflections and devotionals.
        </p>

        <div id="latestPosts" class="grid md:grid-cols-2 gap-8"></div>

        <a href="all-blogs.html"
            class="block w-fit mx-auto mt-10 bg-[#e2b13c] text-white px-7 py-3 rounded-md font-semibold">
            View All Articles
        </a>

    </section>



    <!-- LATEST TEMPLATE -->

    <template id="latestTemplate">

        <div class="bg-white rounded-xl overflow-hidden shadow-lg text-gray-800">

            <div class="relative">

                <img class="latest-image w-full h-[230px] object-cover">

                <span
                    class="latest-category absolute top-4 left-4 bg-[#e2b13c] text-white text-xs px-3 py-1 rounded-full">
                </span>

            </div>

            <div class="p-6">

                <!-- AUTHOR + DATE -->

                <div class="flex items-center gap-6 text-sm text-[#e2b13c] mb-3">

                    <span class="author flex items-center gap-2">

                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 fill-[#e2b13c]" viewBox="0 0 24 24">

                            <path
                                d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z" />

                        </svg>

                        <span></span>

                    </span>


                    <span class="date flex items-center gap-2">

                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 fill-[#e2b13c]" viewBox="0 0 24 24">

                            <path
                                d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z" />

                        </svg>

                        <span></span>

                    </span>

                </div>


                <!-- Divider -->

                <div class="border-t border-gray-300 mb-4"></div>


                <!-- TITLE -->

                <h3 class="latest-title text-3xl font-extrabold mb-2 [font-family:'Darker_Grotesque',sans-serif]"></h3>


                <!-- EXCERPT -->

                <p class="latest-excerpt text-sm text-gray-600 mb-3"></p>


                <!-- READ MORE -->

                <a class="read-more text-[#e2b13c] font-semibold underline">
                    Read More
                </a>

            </div>

        </div>

    </template>



    <script src="/js/blog.js"></script>

</body>

</html>
